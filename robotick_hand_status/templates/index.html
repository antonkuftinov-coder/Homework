<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Состояние робо-руки</title>
    <style>

        #status-box {
            width: 300px;
            height: 100px;
            line-height: 100px; 
            text-align: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
            border-radius: 10px;
            margin: 30px auto;
        }
        .empty {
            background-color: green;
        }
        .holding {
            background-color: red;
        }
        button {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Мониторинг робо-руки</h1>

    <!-- Блок, который будет менять цвет и текст -->
    <div id="status-box" class="empty">Рука пуста</div>

    <!-- Кнопка для переключения -->
    <button id="toggle-btn">Переключить состояние</button>

    <script>
        const statusBox = document.getElementById('status-box');

        function updateStatus(data) {
            if (data.hand === 'empty') {
                statusBox.textContent = 'Рука пуста';
                statusBox.className = 'empty';   // зелёный фон
            } else {
                statusBox.textContent = 'В руке предмет';
                statusBox.className = 'holding'; // красный фон
            }
        }


        setInterval(() => {
            fetch('/status')
                .then(response => response.json())  // парсим JSON
                .then(data => updateStatus(data))   // обновляем страницу
                .catch(err => console.error('Ошибка получения статуса:', err));
        }, 1000);

        document.getElementById('toggle-btn').addEventListener('click', () => {
            // Отправляем POST-запрос на /toggle, чтобы сервер изменил состояние
            fetch('/toggle', { method: 'POST' })
                .then(response => response.json())
                .then(data => updateStatus(data))   // сразу показываем новый статус
                .catch(err => console.error('Ошибка переключения:', err));
        });

        fetch('/status')
            .then(response => response.json())
            .then(data => updateStatus(data));
    </script>
</body>
</html>
